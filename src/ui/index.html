<!doctype html>
<title>engram</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23f7f6f3'/><text x='16' y='24' font-family='sans-serif' font-size='24' text-anchor='middle' fill='%234f6b3c'>✳</text></svg>">
<link rel="stylesheet" href="/app.css">
<script type="module" src="/app.js"></script>

<header id="titlebar" data-tauri-drag-region>
  <button id="side-toggle" type="button" title="Toggle sidebar" aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="3"/><line x1="9.5" y1="4" x2="9.5" y2="20"/></svg>
  </button>
</header>

<aside id="sidebar">
  <div class="side-head">
    <span class="wordmark"><span class="glyph">✳</span>engram</span>
  </div>
  <button class="nav-item active" data-view="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </button>
  <button class="nav-item" data-view="wiki">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11a2 2 0 0 1 2 2v14H7a2 2 0 0 1-2-2V4z"/><path d="M18 6h1a2 2 0 0 1 2 2v12"/><path d="M9 8h6M9 12h6"/></svg>
    <span>Wiki</span>
  </button>
  <button class="nav-item" data-view="analytics">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="4" y2="10"/><line x1="10" y1="20" x2="10" y2="4"/><line x1="16" y1="20" x2="16" y2="13"/><line x1="20" y1="20" x2="4" y2="20"/></svg>
    <span>Analytics</span>
  </button>
  <div class="nav-spacer"></div>
  <button class="nav-item" data-view="setup">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    <span>Setup</span>
  </button>
  <button class="nav-item" data-view="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span>Settings</span>
  </button>
</aside>

<div id="app">
  <div id="search-view" class="view active">
    <div id="header-zone">
      <div id="card">
        <input id="q" type="text" placeholder="Search your coding memory..." autocomplete="off" autofocus />
        <div id="cardbar">
          <span class="left" id="stats">—</span>
          <span id="scope" title="Tab / Shift+Tab to cycle scope">
            <span data-scope="knowledge">knowledge</span>
            <span data-scope="history">history</span>
            <span data-scope="all">all</span>
          </span>
          <span class="right">
            <span id="ask-btn" role="button" tabindex="0" title="Ask a grounded question (⌘↵)">⌘↵ ask</span>
            <span id="latency"></span>
          </span>
        </div>
      </div>
      <div id="status"></div>
    </div>
    <div id="results-pane">
      <div id="answer"></div>
      <div id="results"></div>
      <div id="more"></div>
    </div>
  </div>

  <div id="wiki-view" class="view">
    <div id="wiki-header">
      <h1>Wiki<span id="wiki-lint-chip" class="lint-chip lint-hidden"></span></h1>
      <div id="wiki-lint-list" class="lint-list lint-hidden"></div>
    </div>
    <div id="wiki-list"></div>
  </div>

  <div id="analytics-view" class="view">
    <div id="analytics-header"><h1>Analytics</h1><button id="analytics-refresh" class="hdr-btn" type="button">refresh</button></div>
    <div id="analytics-body"></div>
  </div>

  <div id="setup-view" class="view">
    <div id="setup-header"><h1>Setup</h1><button id="setup-refresh" class="hdr-btn" type="button">refresh</button></div>
    <div id="setup-body"></div>
  </div>

  <div id="settings-view" class="view">
    <div id="settings-header"><h1>Settings</h1></div>
    <div id="settings-body"></div>
  </div>
</div>

<div id="overlay">
  <div id="overlay-head">
    <button id="back">← back</button>
    <div id="overlay-meta"></div>
  </div>
  <div id="overlay-body">
    <div id="overlay-inner">
      <div id="turns"></div>
      <div id="page"></div>
    </div>
  </div>
</div>
