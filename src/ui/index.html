<title>engram</title>
<style>
  :root {
    --bg: #0d0f12;
    --panel: #14171c;
    --panel-hi: #1b1f26;
    --border: #262b33;
    --fg: #e6e9ee;
    --muted: #8a929e;
    --accent: #6ea8fe;
    --hl: #3a2f00;
    --hl-fg: #ffe27a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 15px/1.55 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app { max-width: 780px; margin: 0 auto; padding: 8vh 20px 20vh; }
  h1 {
    font-size: 15px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin: 0 0 18px; text-align: center;
  }
  #q {
    width: 100%; padding: 14px 16px; font-size: 17px; color: var(--fg);
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px; outline: none;
  }
  #q:focus { border-color: var(--accent); }
  #status { color: var(--muted); font-size: 13px; margin: 12px 2px; min-height: 16px; }
  .result {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin: 10px 0; cursor: pointer;
  }
  .result:hover { background: var(--panel-hi); border-color: #33404f; }
  .result .meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .result .meta .sim { color: var(--accent); font-variant-numeric: tabular-nums; }
  .result .snippet { color: var(--fg); font-size: 14px; }
  /* overlay */
  #overlay {
    position: fixed; inset: 0; background: var(--bg); display: none;
    overflow-y: auto; padding: 24px 20px 20vh;
  }
  #overlay.open { display: block; }
  #overlay-inner { max-width: 780px; margin: 0 auto; }
  #back {
    background: var(--panel); color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; margin-bottom: 16px;
  }
  #back:hover { background: var(--panel-hi); }
  #overlay-meta { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .turn {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; margin: 10px 0; white-space: pre-wrap; word-break: break-word;
    font-size: 13.5px; line-height: 1.6;
  }
  .turn.match { border-color: var(--accent); background: var(--panel-hi); }
  .turn .idx { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 8px; }
  .turn.match .idx { color: var(--hl-fg); }
</style>
<div id="app">
  <h1>engram</h1>
  <input id="q" type="text" placeholder="search your sessions…" autocomplete="off" autofocus />
  <div id="status"></div>
  <div id="results"></div>
</div>
<div id="overlay">
  <div id="overlay-inner">
    <button id="back">← back to results</button>
    <div id="overlay-meta"></div>
    <div id="turns"></div>
  </div>
</div>
<script>
  const K = 3;
  const DEBOUNCE_MS = 200;

  const qEl = document.getElementById('q');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  const overlayEl = document.getElementById('overlay');
  const overlayMetaEl = document.getElementById('overlay-meta');
  const turnsEl = document.getElementById('turns');
  document.getElementById('back').addEventListener('click', closeOverlay);

  let debounceTimer = null;
  let inflight = null;

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return isNaN(d) ? '' : d.toLocaleString();
  }

  function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

  function metaSpan(text, cls) {
    const s = document.createElement('span');
    s.textContent = text;
    if (cls) s.className = cls;
    return s;
  }

  function renderResults(items) {
    clear(resultsEl);
    for (const r of items) {
      const card = document.createElement('div');
      card.className = 'result';

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.appendChild(metaSpan('sim ' + r.similarity.toFixed(3), 'sim'));
      meta.appendChild(metaSpan((r.repo || '(no-repo)') + '@' + (r.branch || 'no-branch')));
      if (r.timestamp) meta.appendChild(metaSpan(fmtTime(r.timestamp)));
      meta.appendChild(metaSpan('chunk ' + (r.chunkIndex ?? '?')));

      const snip = document.createElement('div');
      snip.className = 'snippet';
      snip.textContent = r.snippet;

      card.appendChild(meta);
      card.appendChild(snip);
      card.addEventListener('click', () => openTrajectory(r));
      resultsEl.appendChild(card);
    }
  }

  async function search(q) {
    if (inflight) inflight.abort();
    if (!q.trim()) {
      clear(resultsEl);
      statusEl.textContent = '';
      return;
    }
    const ctrl = new AbortController();
    inflight = ctrl;
    statusEl.textContent = 'searching…';
    try {
      const res = await fetch('/api/search?q=' + encodeURIComponent(q) + '&k=' + K, { signal: ctrl.signal });
      const items = await res.json();
      if (ctrl.signal.aborted) return;
      inflight = null;
      if (!Array.isArray(items)) { statusEl.textContent = 'error'; return; }
      statusEl.textContent = items.length ? items.length + ' result' + (items.length === 1 ? '' : 's') : 'no results';
      renderResults(items);
    } catch (err) {
      if (err.name === 'AbortError') return;
      statusEl.textContent = 'error';
    }
  }

  async function openTrajectory(r) {
    if (!r.trajectoryId) {
      overlayMetaEl.textContent = 'This chunk has no trajectory id.';
      clear(turnsEl);
      overlayEl.classList.add('open');
      return;
    }
    overlayMetaEl.textContent = 'loading…';
    clear(turnsEl);
    overlayEl.classList.add('open');
    overlayEl.scrollTop = 0;
    try {
      const res = await fetch('/api/trajectory/' + encodeURIComponent(r.trajectoryId));
      const chunks = await res.json();
      if (!Array.isArray(chunks)) { overlayMetaEl.textContent = 'error loading trajectory'; return; }
      overlayMetaEl.textContent =
        (r.repo || '(no-repo)') + '@' + (r.branch || 'no-branch') + ' · ' + fmtTime(r.timestamp) +
        ' · ' + chunks.length + ' chunks';
      renderTurns(chunks, r.id);
    } catch {
      overlayMetaEl.textContent = 'error loading trajectory';
    }
  }

  function renderTurns(chunks, matchId) {
    clear(turnsEl);
    let matched = null;
    for (const c of chunks) {
      const div = document.createElement('div');
      div.className = 'turn';
      const label = document.createElement('span');
      label.className = 'idx';
      label.textContent = 'chunk ' + (c.chunkIndex ?? '?') +
        (c.chunkCount ? ' / ' + c.chunkCount : '');
      div.appendChild(label);
      const body = document.createElement('div');
      body.textContent = c.content;
      div.appendChild(body);
      if (c.id === matchId) { div.classList.add('match'); matched = div; }
      turnsEl.appendChild(div);
    }
    if (matched) matched.scrollIntoView({ block: 'center' });
  }

  function closeOverlay() {
    overlayEl.classList.remove('open');
    qEl.focus();
  }

  qEl.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => search(qEl.value), DEBOUNCE_MS);
  });
  qEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { clearTimeout(debounceTimer); search(qEl.value); }
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlayEl.classList.contains('open')) closeOverlay();
  });
</script>
