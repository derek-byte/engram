  :root {
    --bg: #0a0a0a;
    --surface: #121212;
    --surface-hi: #191919;
    --inset: #0e0e0e;
    --border: #242424;
    --border-hi: #333;
    --fg: #e5e5e5;
    --muted: #8a8a8a;
    --dim: #555;
    --accent: #94b47e;
    --hl: rgba(148, 180, 126, 0.09);
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.6 var(--mono);
    -webkit-font-smoothing: antialiased;
  }
  #app {
    max-width: 680px;
    margin: 0 auto;
    padding: 22vh 24px 24vh;
  }
  h1 {
    font-family: "Departure Mono", var(--mono);
    font-size: 30px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--fg);
    margin: 0 0 28px;
    text-align: center;
    line-height: 1;
  }
  h1 .glyph { color: var(--accent); margin-right: 0.28em; }

  /* ── search card ── */
  #card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    transition: border-color 0.15s ease;
  }
  #card:focus-within { border-color: var(--border-hi); }
  #q {
    width: 100%;
    padding: 14px 14px 12px;
    font: 15px/1.5 var(--mono);
    color: var(--fg);
    background: transparent;
    border: 0;
    outline: none;
  }
  #q::placeholder { color: var(--dim); }
  #cardbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 9px 14px;
    border-top: 1px solid var(--border);
    font-size: 11.5px;
    color: var(--dim);
  }
  #cardbar .left, #cardbar .right { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #cardbar .right { font-variant-numeric: tabular-nums; }
  #cardbar .accent { color: var(--accent); }

  #status {
    color: var(--dim);
    font-size: 11.5px;
    margin: 16px 4px 4px;
    min-height: 14px;
  }

  /* ── result rows ── */
  #results { margin-top: 2px; }
  .result {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding: 11px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.1s ease;
  }
  .result:hover, .result.active { background: var(--surface-hi); }
  .result.hidden { display: none; }
  .result.active { outline: 1px solid var(--border-hi); outline-offset: -1px; }
  .result .body { min-width: 0; flex: 1; }
  .result .snippet {
    color: var(--fg);
    font-size: 13.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result .sub {
    color: var(--dim);
    font-size: 11.5px;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result .aside {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-shrink: 0;
    font-size: 11.5px;
    font-variant-numeric: tabular-nums;
  }
  .result .age { color: var(--muted); }
  .result .sim { color: var(--dim); }
  .sub .tier-wiki { color: var(--accent); }
  .sub .tier-dream { color: var(--muted); }
  .sub .tier-raw { color: var(--dim); }
  .sub .dupes { color: var(--dim); }

  /* ── wiki answer cards ── */
  .result.wiki-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    border-radius: 10px;
    margin: 8px 0;
    padding: 14px 16px;
    align-items: flex-start;
  }
  .result.wiki-card:hover, .result.wiki-card.active { background: var(--surface-hi); }
  .card-title {
    color: var(--fg);
    font-size: 14px;
    margin-bottom: 6px;
    text-transform: capitalize;
  }
  .card-kind {
    color: var(--accent);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-left: 10px;
  }
  .snippet.card-snippet {
    color: var(--muted);
    white-space: normal;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    font-size: 13px;
    line-height: 1.55;
  }
  .section-label {
    color: var(--dim);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 16px 12px 4px;
  }
  #more {
    display: none;
    color: var(--dim);
    font-size: 11px;
    padding: 10px 12px;
    cursor: pointer;
    transition: color 0.1s ease;
  }
  #more:hover { color: var(--muted); }

  /* ── overlay ── */
  #overlay {
    position: fixed; inset: 0; background: var(--bg); display: none;
    overflow-y: auto; padding: 32px 24px 24vh;
  }
  #overlay.open { display: block; }
  #overlay-inner { max-width: 680px; margin: 0 auto; }
  #back {
    background: var(--surface); color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 13px; font: 12px/1 var(--mono); cursor: pointer; margin-bottom: 20px;
    transition: background-color 0.1s ease, color 0.1s ease;
  }
  #back:hover { background: var(--surface-hi); color: var(--fg); }
  #overlay-meta { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
  .turn {
    border-left: 2px solid transparent;
    padding: 12px 16px; margin: 6px 0; white-space: pre-wrap; word-break: break-word;
    font-size: 13px; line-height: 1.65; color: var(--fg);
  }
  .turn.match {
    border-left-color: var(--accent);
    background: var(--hl);
    border-radius: 0 8px 8px 0;
  }
  .turn .idx {
    font-size: 10.5px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em;
    display: block; margin-bottom: 8px;
  }
  .turn.match .idx { color: var(--accent); }
</style>
<div id="app">
  <h1><span class="glyph">✳</span>engram</h1>
  <div id="card">
    <input id="q" type="text" placeholder="Search your coding memory..." autocomplete="off" autofocus />
    <div id="cardbar">
      <span class="left" id="stats">—</span>
      <span class="right" id="latency"></span>
    </div>
  </div>
  <div id="status"></div>
  <div id="results"></div>
  <div id="more"></div>
</div>
<div id="overlay">
  <div id="overlay-inner">
    <button id="back">← back</button>
    <div id="overlay-meta"></div>
    <div id="turns"></div>
  </div>
</div>
<script>
  const FETCH_K = 25;       // fetched per query (server clamps at 50)
  const INITIAL_VISIBLE = 3; // compact default; ↓ past the last row reveals more
  const DEBOUNCE_MS = 200;

  const qEl = document.getElementById('q');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  const statsEl = document.getElementById('stats');
  const latencyEl = document.getElementById('latency');
  const moreEl = document.getElementById('more');
  const overlayEl = document.getElementById('overlay');
  const overlayMetaEl = document.getElementById('overlay-meta');
  const turnsEl = document.getElementById('turns');
  document.getElementById('back').addEventListener('click', closeOverlay);
  moreEl.addEventListener('click', () => reveal(visible + 5));

  let debounceTimer = null;
  let inflight = null;
  let rows = [];       // current result <div> elements
  let items = [];      // current result data
  let activeIndex = -1;
  let visible = INITIAL_VISIBLE;

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return isNaN(d) ? '' : d.toLocaleString();
  }

  // Compact relative age like "9d", "3h", "5m".
  function relAge(ts) {
    if (!ts) return '';
    const then = new Date(ts).getTime();
    if (isNaN(then)) return '';
    const s = Math.max(0, (Date.now() - then) / 1000);
    if (s < 60) return Math.floor(s) + 's';
    const m = s / 60;
    if (m < 60) return Math.floor(m) + 'm';
    const h = m / 60;
    if (h < 24) return Math.floor(h) + 'h';
    const d = h / 24;
    if (d < 7) return Math.floor(d) + 'd';
    const w = d / 7;
    if (w < 5) return Math.floor(w) + 'w';
    const mo = d / 30;
    if (mo < 12) return Math.floor(mo) + 'mo';
    return Math.floor(d / 365) + 'y';
  }

  function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

  // Human label for a result's memory tier. Dream/raw are dated episodic
  // snapshots; wiki is current compiled knowledge.
  function tierLabel(r) {
    if (r.tier === 'wiki') return 'wiki' + (r.kind ? ':' + r.kind : '');
    if (r.tier === 'dream') return 'dream' + (r.kind ? ':' + r.kind : '');
    return 'raw';
  }

  async function loadStats() {
    try {
      const res = await fetch('/api/stats');
      const s = await res.json();
      if (!s || typeof s.chunks !== 'number') return;
      clear(statsEl);
      const model = document.createElement('span');
      model.className = 'accent';
      model.textContent = s.model + (s.dim ? ' · ' + s.dim + 'd' : '');
      const count = document.createElement('span');
      count.textContent = ' · ' + s.chunks.toLocaleString() + ' chunks';
      statsEl.appendChild(model);
      statsEl.appendChild(count);
    } catch { /* stats are cosmetic; ignore */ }
  }

  function setActive(i) {
    if (rows[activeIndex]) rows[activeIndex].classList.remove('active');
    activeIndex = i;
    const row = rows[activeIndex];
    if (row) {
      row.classList.add('active');
      row.scrollIntoView({ block: 'nearest' });
    }
  }

  let wikiN = 0; // leading wiki cards, always visible; `visible` counts history rows

  function updateStatus() {
    if (!items.length) {
      statusEl.textContent = qEl.value.trim() ? 'no results' : '';
      moreEl.style.display = 'none';
      return;
    }
    statusEl.textContent = items.length + ' result' + (items.length === 1 ? '' : 's');
    const remaining = items.length - wikiN - visible;
    if (remaining > 0) {
      moreEl.textContent = 'show ' + remaining + ' more from history ↓';
      moreEl.style.display = 'block';
    } else {
      moreEl.style.display = 'none';
    }
  }

  function reveal(n) {
    visible = Math.min(n, items.length - wikiN);
    rows.forEach((row, i) => row.classList.toggle('hidden', i >= wikiN + visible));
    updateStatus();
  }

  // Near-duplicate collapse for episodic rows: dream units restate the same
  // fact across sessions; one row per fact, "+N similar" on the survivor.
  function wordSet(s) {
    return new Set(s.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter((w) => w.length > 3));
  }
  function similar(a, b) {
    let hit = 0;
    for (const w of a) if (b.has(w)) hit++;
    const denom = Math.min(a.size, b.size) || 1;
    return hit / denom > 0.6;
  }

  function buildRow(r, i, isCard) {
    const row = document.createElement('div');
    row.className = isCard ? 'result wiki-card' : 'result';

    const body = document.createElement('div');
    body.className = 'body';
    if (isCard) {
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = (r.slug || 'page').replace(/-/g, ' ');
      const kind = document.createElement('span');
      kind.className = 'card-kind';
      kind.textContent = r.kind || 'page';
      title.appendChild(kind);
      body.appendChild(title);
    }
    const snip = document.createElement('div');
    snip.className = isCard ? 'snippet card-snippet' : 'snippet';
    snip.textContent = r.snippet;
    body.appendChild(snip);
    if (!isCard) {
      const sub = document.createElement('div');
      sub.className = 'sub';
      const badge = document.createElement('span');
      badge.className = 'tier tier-' + (r.tier || 'raw');
      badge.textContent = tierLabel(r);
      sub.appendChild(badge);
      const where = document.createElement('span');
      where.textContent = ' · ' + (r.repo || '(no-repo)') + '@' + (r.branch || 'no-branch');
      sub.appendChild(where);
      if (r._dupes) {
        const dupes = document.createElement('span');
        dupes.className = 'dupes';
        dupes.textContent = ' · +' + r._dupes + ' similar';
        sub.appendChild(dupes);
      }
      body.appendChild(sub);
    }

    const aside = document.createElement('div');
    aside.className = 'aside';
    const age = document.createElement('span');
    age.className = 'age';
    age.textContent = relAge(r.timestamp);
    aside.appendChild(age);
    if (!isCard) {
      const sim = document.createElement('span');
      sim.className = 'sim';
      sim.textContent = (r.similarity * 100).toFixed(0) + '%';
      aside.appendChild(sim);
    }

    row.appendChild(body);
    row.appendChild(aside);
    row.addEventListener('click', () => openTrajectory(r));
    row.addEventListener('mouseenter', () => setActive(i));
    return row;
  }

  function renderResults(list) {
    clear(resultsEl);
    rows = [];
    activeIndex = -1;
    visible = INITIAL_VISIBLE;

    // Knowledge first: wiki pages are answer cards; dream/raw are the dated
    // episodic record behind them — deduped, collapsed by default.
    const wiki = list.filter((r) => r.tier === 'wiki');
    const episodic = [];
    for (const r of list.filter((r) => r.tier !== 'wiki')) {
      const ws = wordSet(r.snippet);
      const dupe = episodic.find((k) => similar(ws, k._ws));
      if (dupe) { dupe._dupes = (dupe._dupes || 0) + 1; continue; }
      r._ws = ws;
      episodic.push(r);
    }
    items = wiki.concat(episodic);
    wikiN = wiki.length;

    items.forEach((r, i) => {
      if (i === wikiN && wikiN > 0 && episodic.length > 0) {
        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = 'episodic memory';
        resultsEl.appendChild(label);
      }
      const row = buildRow(r, i, i < wikiN);
      if (i >= wikiN + visible) row.classList.add('hidden');
      resultsEl.appendChild(row);
      rows.push(row);
    });
  }

  async function search(q) {
    if (inflight) inflight.abort();
    if (!q.trim()) {
      clear(resultsEl);
      rows = []; items = []; activeIndex = -1;
      statusEl.textContent = '';
      latencyEl.textContent = '';
      moreEl.style.display = 'none';
      return;
    }
    const ctrl = new AbortController();
    inflight = ctrl;
    statusEl.textContent = 'searching…';
    const t0 = performance.now();
    try {
      const res = await fetch('/api/search?q=' + encodeURIComponent(q) + '&k=' + FETCH_K, { signal: ctrl.signal });
      const list = await res.json();
      if (ctrl.signal.aborted) return;
      inflight = null;
      const ms = Math.round(performance.now() - t0);
      if (!Array.isArray(list)) { statusEl.textContent = 'error'; return; }
      latencyEl.textContent = ms + 'ms';
      renderResults(list);
      updateStatus();
    } catch (err) {
      if (err.name === 'AbortError') return;
      statusEl.textContent = 'error';
    }
  }

  async function openTrajectory(r) {
    if (!r.trajectoryId) {
      overlayMetaEl.textContent = 'This chunk has no trajectory id.';
      clear(turnsEl);
      overlayEl.classList.add('open');
      return;
    }
    overlayMetaEl.textContent = 'loading…';
    clear(turnsEl);
    overlayEl.classList.add('open');
    overlayEl.scrollTop = 0;
    try {
      const res = await fetch('/api/trajectory/' + encodeURIComponent(r.trajectoryId));
      const chunks = await res.json();
      if (!Array.isArray(chunks)) { overlayMetaEl.textContent = 'error loading trajectory'; return; }
      overlayMetaEl.textContent =
        (r.tier === 'wiki'
          ? 'wiki page · ' + (r.slug || '?') + ' · current compiled knowledge · updated ' + fmtTime(r.timestamp)
          : r.tier === 'dream'
            ? 'dream unit · dated snapshot of ' + fmtTime(r.timestamp) + ' · ' + (r.repo || '(no-repo)')
            : (r.repo || '(no-repo)') + '@' + (r.branch || 'no-branch') + ' · ' + fmtTime(r.timestamp)) +
        ' · ' + chunks.length + ' chunk' + (chunks.length === 1 ? '' : 's');
      renderTurns(chunks, r.id);
    } catch {
      overlayMetaEl.textContent = 'error loading trajectory';
    }
  }

  function renderTurns(chunks, matchId) {
    clear(turnsEl);
    let matched = null;
    for (const c of chunks) {
      const div = document.createElement('div');
      div.className = 'turn';
      const label = document.createElement('span');
      label.className = 'idx';
      label.textContent = 'chunk ' + (c.chunkIndex ?? '?') +
        (c.chunkCount ? ' / ' + c.chunkCount : '');
      div.appendChild(label);
      const body = document.createElement('div');
      body.textContent = c.content;
      div.appendChild(body);
      if (c.id === matchId) { div.classList.add('match'); matched = div; }
      turnsEl.appendChild(div);
    }
    if (matched) matched.scrollIntoView({ block: 'center' });
  }

  function closeOverlay() {
    overlayEl.classList.remove('open');
    qEl.focus();
  }

  qEl.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => search(qEl.value), DEBOUNCE_MS);
  });
  qEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (activeIndex >= 0 && items[activeIndex]) { openTrajectory(items[activeIndex]); return; }
      clearTimeout(debounceTimer);
      search(qEl.value);
    } else if (e.key === 'ArrowDown') {
      if (rows.length) {
        e.preventDefault();
        // Stepping past the last visible row reveals the next hidden one.
        const limit = wikiN + visible;
        if (activeIndex >= limit - 1 && limit < items.length) reveal(visible + 1);
        setActive(Math.min(activeIndex + 1, wikiN + visible - 1));
      }
    } else if (e.key === 'ArrowUp') {
      if (rows.length) { e.preventDefault(); setActive(Math.max(activeIndex - 1, 0)); }
    }
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlayEl.classList.contains('open')) closeOverlay();
  });

  loadStats();
</script>
